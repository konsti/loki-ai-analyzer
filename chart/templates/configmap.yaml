apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "loki-ai-analyzer.fullname" . }}
  labels:
    {{- include "loki-ai-analyzer.labels" . | nindent 4 }}
data:
  LOKI_ANALYZER_LOKI_URL: {{ .Values.config.lokiURL | quote }}
  LOKI_ANALYZER_LOKI_QUERY: {{ .Values.config.lokiQuery | quote }}
  LOKI_ANALYZER_LOKI_QUERY_LIMIT: {{ .Values.config.lokiQueryLimit | quote }}
  LOKI_ANALYZER_ANALYSIS_PERIOD: {{ .Values.config.analysisPeriod | quote }}
  LOKI_ANALYZER_ANTHROPIC_MODEL: {{ .Values.config.anthropicModel | quote }}
  LOKI_ANALYZER_ANTHROPIC_CONTEXT_WINDOW: {{ .Values.config.anthropicContextWindow | quote }}
  LOKI_ANALYZER_PROMPT_FILE: {{ .Values.config.promptFile | quote }}
  LOKI_ANALYZER_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
