apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "loki-ai-analyzer.fullname" . }}
  labels:
    {{- include "loki-ai-analyzer.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.jobHistoryLimit.successful }}
  failedJobsHistoryLimit: {{ .Values.jobHistoryLimit.failed }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "loki-ai-analyzer.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          serviceAccountName: {{ include "loki-ai-analyzer.serviceAccountName" . }}
          restartPolicy: Never
          containers:
            - name: analyzer
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              envFrom:
                - configMapRef:
                    name: {{ include "loki-ai-analyzer.fullname" . }}
              env:
                - name: LOKI_ANALYZER_ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "loki-ai-analyzer.secretName" . }}
                      key: {{ .Values.secrets.anthropicAPIKeyKey }}
                - name: LOKI_ANALYZER_SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "loki-ai-analyzer.secretName" . }}
                      key: {{ .Values.secrets.slackWebhookURLKey }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
