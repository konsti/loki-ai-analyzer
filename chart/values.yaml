image:
  repository: ghcr.io/unique/loki-ai-analyzer
  tag: "latest"
  pullPolicy: IfNotPresent

schedule: "0 */12 * * *"

config:
  lokiURL: "http://loki-gateway.monitoring.svc.cluster.local:80"
  lokiQueryLimit: "5000"
  # Optional filters (comma-separated). Empty = all.
  lokiServices: ""
  lokiNamespaces: ""
  # Advanced: raw LogQL override (takes precedence over filters if set)
  lokiQuery: ""
  analysisPeriod: "12h"
  anthropicModel: "claude-opus-4-20250514"
  anthropicContextWindow: "1000000"
  promptFile: "/etc/analyzer/prompts/system.md"
  logLevel: "info"

secrets:
  anthropicAPIKey: ""
  slackWebhookURL: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: ""
  annotations: {}

jobHistoryLimit:
  successful: 3
  failed: 3

backoffLimit: 1
